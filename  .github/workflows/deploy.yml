name: Deploy Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install curl
        run: sudo apt-get install -y curl

      - name: Deploy Dashboard to Splunk
        run: |
          curl -X POST https://api.signalfx.com/v2/dashboard \
          -H "Content-Type: application/json" \
          -H "X-SF-TOKEN: ${{ secrets.SPLUNK_TOKEN }}" \
          -d @dashboard.json